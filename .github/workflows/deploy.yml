        docker push $ECR_REGISTRY/$ECR_REPOSITORY:eurekaserver-$IMAGE_TAG
    - name: Build, tag, and push hospitalservice
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd backend/hospitalservice
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:hospitalservice-$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:hospitalservice-$IMAGE_TAG
    - name: Build, tag, and push organizationservice
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd backend/organizationservice
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:organizationservice-$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:organizationservice-$IMAGE_TAG
    - name: Build, tag, and push patientservice
      env:
