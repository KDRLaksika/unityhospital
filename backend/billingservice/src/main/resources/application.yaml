server:
  port: 8086

spring:
  application:
    name: billingservice

  datasource:
    url: jdbc:postgresql://localhost:5432/billingdb
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
